<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Empresas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Dashboard</a>

    <div class="d-flex align-items-center gap-2">
      <a class="btn btn-outline-light" href="{% url 'lista_empresas' %}">Empresas</a>
      <a class="btn btn-outline-light" href="{% url 'lista_funcionarios' %}">Funcionários</a>

      <span class="text-white">
        Olá, {{ request.user.username }}
      </span>

      <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="btn btn-danger btn-sm">Sair</button>
      </form>
    </div>
  </div>
</nav>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} m-3">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
