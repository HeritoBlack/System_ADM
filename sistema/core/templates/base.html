<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema ADM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .wrapper {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1e293b;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h4 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        /* CONTEÚDO */
        .content {
            margin-left: 240px;
            width: 100%;
        }

        /* NAVBAR */
        .topbar {
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main {
            padding: 20px;
        }

        .card-dashboard {
            border-radius: 12px;
            padding: 20px;
            color: white;
        }

        .bg-blue { background: #0d6efd; }
        .bg-green { background: #198754; }
        .bg-dark { background: #212529; }
    </style>
</head>
<body>

{% if user.is_authenticated %}
<div class="wrapper">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h4>ADM System</h4>

        <a href="{% url 'dashboard' %}">🏠 Dashboard</a>
        <a href="{% url 'lista_empresas' %}">🏢 Empresas</a>
        <a href="{% url 'lista_funcionarios' %}">👨‍💼 Funcionários</a>
    </div>

    <!-- CONTEÚDO -->
    <div class="content">

        <!-- NAVBAR -->
        <div class="topbar">
            <div>
                <strong>Bem-vindo, {{ user.username }}</strong>
            </div>

            <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="btn btn-danger btn-sm">Sair</button>
            </form>
        </div>

        <!-- MENSAGENS -->
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} m-3">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}

        <!-- CONTEÚDO DAS PÁGINAS -->
        <div class="main">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

{% else %}
    <!-- Se não estiver logado -->
    <script>
        window.location.href = "{% url 'login' %}";
    </script>
{% endif %}

</body>
</html>
