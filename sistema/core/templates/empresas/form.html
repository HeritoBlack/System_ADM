{% extends 'base.html' %}

{% block content %}
<h2>Cadastro de Empresa</h2>

<div class="card p-4 shadow">
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success">Salvar</button>
    <a class="btn btn-secondary" href="{% url 'lista_empresas' %}">Voltar</a>
  </form>
</div>
{% endblock %}
