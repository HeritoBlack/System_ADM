{% extends 'base.html' %}

{% block content %}
<h2>Empresas</h2>

<a class="btn btn-primary mb-3" href="{% url 'criar_empresa' %}">
    Nova Empresa
</a>

<!-- 🔍 BUSCA (fora do for) -->
<form method="GET" class="mb-3">
  <input class="form-control" type="text" name="q" placeholder="Buscar empresa..." value="{{ request.GET.q }}">
</form>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Nome</th>
      <th>CNPJ</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for empresa in empresas %}
    <tr>
      <td>{{ empresa.nome }}</td>
      <td>{{ empresa.cnpj }}</td>
      <td>
        <a class="btn btn-warning btn-sm" href="{% url 'editar_empresa' empresa.id %}">Editar</a>
        <form method="POST" action="{% url 'excluir_empresa' empresa.id %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-sm">
        Excluir
    </button>
</form>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="3">Nenhuma empresa encontrada.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
