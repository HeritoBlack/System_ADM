{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Sistema Empresarial</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            display: flex;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .left {
            width: 50%;
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .left h1 {
            font-size: 40px;
            font-weight: bold;
        }

        .left p {
            font-size: 18px;
            opacity: 0.9;
        }

        .right {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 8px;
        }

        .btn-login {
            width: 100%;
            border-radius: 8px;
        }

        .footer-text {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<!-- LADO ESQUERDO -->
<div class="left">
    <h1>Sistema Empresarial</h1>
    <p>Gerencie empresas, funcionários e dados com eficiência.</p>
</div>

<!-- LADO DIREITO -->
<div class="right">
    <div class="login-box">
        <h2>Entrar</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label>Usuário</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Senha</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                Entrar
            </button>
        </form>

        <div class="footer-text">
            <p>Não tem conta?</p>
            <a href="{% url 'registro' %}" class="btn btn-success btn-sm">
                Criar Conta
            </a>
        </div>
    </div>
</div>

</body>
</html>
