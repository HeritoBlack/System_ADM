{% extends 'base.html' %}

{% block content %}
<h2>Funcionários</h2>

<a class="btn btn-primary mb-3" href="{% url 'criar_funcionario' %}">
    Novo Funcionário
</a>

<table class="table table-striped">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Cargo</th>
      <th>Empresa</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    {% for f in funcionarios %}
    <tr>
      <td>{{ f.nome }}</td>
      <td>{{ f.cargo }}</td>
      <td>{{ f.empresa.nome }}</td>
      <td>
        <!-- Editar -->
        <a class="btn btn-warning btn-sm" href="{% url 'editar_funcionario' f.id %}">
            Editar
        </a>

        <!-- Excluir (CORRIGIDO) -->
        <form method="POST" action="{% url 'excluir_funcionario' f.id %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger btn-sm"
                    onclick="return confirm('Tem certeza que deseja excluir este funcionário?')">
                Excluir
            </button>
        </form>
      </td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="4">Nenhum funcionário cadastrado.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
